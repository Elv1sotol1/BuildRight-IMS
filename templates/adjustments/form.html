{% extends 'base.html' %}
{% block title %}Request Stock Adjustment{% endblock %}
{% block content %}
<div class="page-header">
    <div class="page-title">Request Stock Adjustment</div>
    <div class="page-subtitle">Submit a stock correction for Manager or Admin approval</div>
</div>
<div class="card" style="max-width:560px">
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label class="form-label">Item <span style="color:var(--danger)">*</span></label>
            <select name="item_id" class="form-control" required onchange="showStock(this)">
                <option value="">Select item</option>
                {% for item in items %}
                <option value="{{ item.item_id }}" data-stock="{{ item.current_stock }}" data-unit="{{ item.unit_of_measure }}">
                    {{ item.name }} ({{ item.item_id }}) — Stock: {{ item.current_stock }}
                </option>
                {% endfor %}
            </select>
            <div id="stockInfo" style="display:none;margin-top:6px;font-size:0.85rem;color:#546e7a">
                Current stock: <strong id="stockVal"></strong>
            </div>
        </div>
        <div class="grid-2">
            <div class="form-group">
                <label class="form-label">Adjustment Type <span style="color:var(--danger)">*</span></label>
                <select name="adjustment_type" class="form-control" required>
                    <option value="">Select type</option>
                    <option value="Increase">Increase (Add Stock)</option>
                    <option value="Decrease">Decrease (Remove Stock)</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Quantity <span style="color:var(--danger)">*</span></label>
                <input type="number" name="quantity" class="form-control" min="1" required>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">Reason <span style="color:var(--danger)">*</span></label>
            <input type="text" name="reason" class="form-control" required
                placeholder="e.g. Physical count discrepancy, damaged goods write-off">
        </div>
        <div class="form-group">
            <label class="form-label">Additional Notes</label>
            <textarea name="notes" class="form-control" rows="2" placeholder="Optional"></textarea>
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary"><i class="fas fa-paper-plane"></i> Submit for Approval</button>
            <a href="{{ url_for('adjustments.list_adjustments') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
{% block extra_js %}
<script>
    function showStock(sel) {
        const opt = sel.options[sel.selectedIndex];
        if (opt.value) {
            document.getElementById('stockVal').textContent = opt.dataset.stock + ' ' + opt.dataset.unit;
            document.getElementById('stockInfo').style.display = 'block';
        } else {
            document.getElementById('stockInfo').style.display = 'none';
        }
    }
</script>
{% endblock %}
