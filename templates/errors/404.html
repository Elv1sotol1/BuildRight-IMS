<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>404 | BuildRight</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@700&family=DM+Sans&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'DM Sans', sans-serif; background: #ECF0F1; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .box { text-align: center; padding: 40px; }
        .code { font-family: 'Sora', sans-serif; font-size: 6rem; font-weight: 700; color: #dde3e8; line-height: 1; }
        .title { font-family: 'Sora', sans-serif; font-size: 1.4rem; font-weight: 700; color: #2C3E50; margin-top: 8px; }
        .sub { color: #90a4ae; margin-top: 8px; }
        .btn { display: inline-block; margin-top: 24px; padding: 10px 24px; background: #3498DB; color: white; border-radius: 8px; text-decoration: none; font-weight: 600; }
        .btn:hover { background: #2980b9; }
    </style>
</head>
<body>
    <div class="box">
        <div class="code">404</div>
        <div class="title">Page Not Found</div>
        <p class="sub">The page you are looking for does not exist.</p>
        <a href="/dashboard" class="btn">Back to Dashboard</a>
    </div>
</body>
</html>
